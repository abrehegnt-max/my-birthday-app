<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 80%;
        }
        h1 { color: #ff4757; }
        button {
            background: #2ed573;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 Happy Birthday! 🎂</h1>
        <p>Wishing you a day filled with joy and laughter.</p>
        <button onclick="closeApp()">Thanks!</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Opens the app to full height

        function closeApp() {
            tg.close(); // Closes the web app
        }
    </script>
</body>
</html>
