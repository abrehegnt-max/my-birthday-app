<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        button {
            background: #ff00de;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 222, 0.4);
            transition: 0.3s;
        }
        button:hover {
            background: #ff47e6;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px;">🎂</div>
        <h1>Happy Birthday!</h1>
        <p>You deserve the best day ever!</p>
        <button onclick="celebrate()">TAP FOR SURPRISE! 🎉</button>
    </div>

    <script>
        function celebrate() {
            // This creates a burst of confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff00de', '#ff47e6', '#ffffff', '#00d4ff']
            });
        }
        
        // Trigger a small burst automatically when they open it
        window.onload = () => {
            setTimeout(() => {
                confetti({ particleCount: 50, spread: 50, origin: { y: 0.8 } });
            }, 500);
        };
    </script>
</body>
</html>
